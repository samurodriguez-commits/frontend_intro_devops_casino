name: Deploy casino-frontend

on:
  push:
    branches:
      - deploy

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
          -t casino-frontend:${{ github.sha }} .

      - name: Tag Docker image
        run: |
          docker tag casino-frontend:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/casino-frontend:${{ github.sha }}
          docker tag casino-frontend:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/casino-frontend:latest
          docker tag casino-frontend:${{ github.sha }} \
          ${{ steps.login-ecr.outputs.registry }}/casino-frontend:v1.0.0

      - name: Push Docker image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/casino-frontend:${{ github.sha }}
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/casino-frontend:latest
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/casino-frontend:v1.0.0

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
          --name ${{ secrets.EKS_CLUSTER }} \
          --region ${{ secrets.AWS_REGION }}

      - name: Deploy frontend to EKS
        run: |
          kubectl apply -f kubernetes/
          kubectl rollout restart deployment/casino-frontend