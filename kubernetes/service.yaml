apiVersion: apps/v1
kind: Deployment

metadata:
  name: casino-frontend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-frontend

  template:
    metadata:
      labels:
        app: casino-frontend

    spec:
      containers:
      - name: casino-frontend
        image: 546388928625.dkr.ecr.us-east-1.amazonaws.com/casino-frontend:latest
        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"

          limits:
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /
            port: 8080

          initialDelaySeconds: 5
          periodSeconds: 10